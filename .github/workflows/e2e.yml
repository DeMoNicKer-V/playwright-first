name: "e2e"

on: ["push"]

jobs:
  test-e2e:
    name: Run E2E tests
    runs-on: ubuntu-latest
    # Image tag must match @playwright/test version in package.json
    container:
      image: mcr.microsoft.com/playwright:v1.52.0-noble
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx playwright test
        env:
          HOME: /root

      - name: Upload Test Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
