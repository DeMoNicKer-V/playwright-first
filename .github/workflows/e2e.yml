name: "e2e"
on: [ "push" ]
jobs:
    test-e2e:
        name: Run E2E tests
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
            - name: Install Devendencies
              run: npm ci
            - name: Install Playwright
              run: npx playwright install --with-deps
            - name: Run Home tests
              run: npx playwright test tests/home.spec.ts
